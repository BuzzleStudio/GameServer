# Deploy Cloud Code Modules to Staging
#
# Triggers on every push to the staging branch.
# Builds the .NET Cloud Code Module, authenticates with UGS, deploys, and verifies.
#
# Required GitHub Secrets:
#   UNITY_PROJECT_ID              — Unity Dashboard project ID
#   UNITY_ENVIRONMENT             — UGS target environment name (e.g. "production")
#   UNITY_SERVICE_ACCOUNT_KEY     — Service account key ID from UGS Dashboard
#   UNITY_SERVICE_ACCOUNT_SECRET  — Service account secret key

name: Deploy Cloud Code Modules to Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy-cloud-code:
    name: Deploy BackpackAdventures Cloud Code Module
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET 7
      # ------------------------------------------------------------------
      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      # ------------------------------------------------------------------
      # 3. Setup Node.js for UGS CLI
      # ------------------------------------------------------------------
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ------------------------------------------------------------------
      # 4. Install Unity Gaming Services CLI
      # ------------------------------------------------------------------
      - name: Install UGS CLI
        run: npm install -g ugs

      # ------------------------------------------------------------------
      # 5. Verify UGS CLI installed
      # ------------------------------------------------------------------
      - name: Verify UGS CLI version
        run: ugs --version

      # ------------------------------------------------------------------
      # 6. Authenticate with UGS service account
      # ------------------------------------------------------------------
      - name: Authenticate with UGS
        run: |
          ugs login \
            --service-account-key-id ${{ secrets.UNITY_SERVICE_ACCOUNT_KEY }} \
            --secret ${{ secrets.UNITY_SERVICE_ACCOUNT_SECRET }}

      # ------------------------------------------------------------------
      # 7. Validate deployment artifacts exist
      # ------------------------------------------------------------------
      - name: Validate deployment artifacts
        run: |
          set -e
          echo "Checking required deployment artifacts..."

          if [ ! -f "CloudCodeModules/BackpackAdventuresModule.ccmr" ]; then
            echo "ERROR: CloudCodeModules/BackpackAdventuresModule.ccmr not found"
            exit 1
          fi

          if [ ! -f "CloudCodeModules/BackpackAdventuresModule/BackpackAdventuresModule.csproj" ]; then
            echo "ERROR: CloudCodeModules/BackpackAdventuresModule/BackpackAdventuresModule.csproj not found"
            exit 1
          fi

          echo "All required artifacts present."

      # ------------------------------------------------------------------
      # 8. Build .NET module
      # ------------------------------------------------------------------
      - name: Build Cloud Code Module (.NET)
        run: |
          set -e
          dotnet restore CloudCodeModules/BackpackAdventuresModule/BackpackAdventuresModule.csproj
          dotnet publish CloudCodeModules/BackpackAdventuresModule/BackpackAdventuresModule.csproj \
            -c Release \
            --no-restore

      # ------------------------------------------------------------------
      # 9. Deploy Cloud Code Module via UGS CLI
      # ------------------------------------------------------------------
      - name: Deploy Cloud Code Module
        run: |
          set -e
          ugs deploy CloudCodeModules/BackpackAdventuresModule.ccmr \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ secrets.UNITY_ENVIRONMENT }}

      # ------------------------------------------------------------------
      # 10. Verify deployment — list deployed modules
      # ------------------------------------------------------------------
      - name: Verify deployment
        run: |
          set -e
          ugs cloud-code modules list \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ secrets.UNITY_ENVIRONMENT }}

      # ------------------------------------------------------------------
      # Final summary
      # ------------------------------------------------------------------
      - name: Deployment summary
        if: always()
        run: |
          echo "========================================"
          echo "  DEPLOYMENT SUMMARY"
          echo "========================================"
          echo "  Module      : BackpackAdventures"
          echo "  Source      : CloudCodeModules/BackpackAdventuresModule.ccmr"
          echo "  Environment : ${{ secrets.UNITY_ENVIRONMENT }}"
          echo "  Timestamp   : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Actor       : ${{ github.actor }}"
          echo "========================================"
