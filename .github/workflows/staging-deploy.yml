# Deploy Cloud Code Modules to Staging
#
# Triggers on every push to the staging branch, or manually via workflow_dispatch.
# Builds the .NET Cloud Code Module, authenticates with UGS, deploys, and verifies.
#
# Required GitHub Secrets:
#   UNITY_PROJECT_ID              — Unity Dashboard project ID
#   UNITY_ENVIRONMENT             — UGS target environment name (e.g. "production")
#   UNITY_PROJECT_SERVICE_ACCOUNT_KEY     - Project-scoped service account key ID
#   UNITY_PROJECT_SERVICE_ACCOUNT_SECRET  - Project-scoped service account secret

name: Deploy Cloud Code Modules to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      admin_test_player_id:
        description: 'Optional target Player ID for SendUserMail post-deploy smoke test'
        required: false
        type: string

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy-cloud-code:
    name: Deploy BackpackAdventures Cloud Code Module
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UGS_CLI_SERVICE_KEY_ID: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
      UGS_CLI_SERVICE_SECRET_KEY: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET 7
      # ------------------------------------------------------------------
      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      # ------------------------------------------------------------------
      # 3. Setup Node.js for UGS CLI
      # ------------------------------------------------------------------
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ------------------------------------------------------------------
      # 4. Install Unity Gaming Services CLI
      # ------------------------------------------------------------------
      - name: Install UGS CLI
        run: npm install -g ugs

      # ------------------------------------------------------------------
      # 5. Verify UGS CLI installed
      # ------------------------------------------------------------------
      - name: Verify UGS CLI version
        run: ugs --version

      # ------------------------------------------------------------------
      # 6. Validate required secrets are present
      # ------------------------------------------------------------------
      - name: Validate required secrets
        env:
          PROJECT_ID: ${{ secrets.UNITY_PROJECT_ID }}
          ENVIRONMENT: ${{ secrets.UNITY_ENVIRONMENT }}
          ACCOUNT_KEY: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
          ACCOUNT_SECRET: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}
        run: |
          set -e
          MISSING=""
          [ -z "$PROJECT_ID" ]     && MISSING="$MISSING UNITY_PROJECT_ID"
          [ -z "$ENVIRONMENT" ]    && MISSING="$MISSING UNITY_ENVIRONMENT"
          [ -z "$ACCOUNT_KEY" ]    && MISSING="$MISSING UNITY_PROJECT_SERVICE_ACCOUNT_KEY"
          [ -z "$ACCOUNT_SECRET" ] && MISSING="$MISSING UNITY_PROJECT_SERVICE_ACCOUNT_SECRET"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing required GitHub Secrets:$MISSING"
            echo "Configure them as repository secrets or attach this workflow to a GitHub Environment that provides them."
            exit 1
          fi
          echo "All required secrets are present."

      # ------------------------------------------------------------------
      # 7. Validate deployment artifacts exist
      # ------------------------------------------------------------------
      - name: Validate deployment artifacts
        run: |
          set -e
          echo "Checking required deployment artifacts..."

          if [ ! -f "CloudCodeModule/BackpackAdventures.ccmr" ]; then
            echo "ERROR: CloudCodeModule/BackpackAdventures.ccmr not found"
            echo "Ensure the backend module was committed to the staging branch."
            exit 1
          fi

          if [ ! -f "CloudCodeModule/BackpackAdventuresModule~/BackpackAdventuresModule.csproj" ]; then
            echo "ERROR: CloudCodeModule/BackpackAdventuresModule~/BackpackAdventuresModule.csproj not found"
            exit 1
          fi

          echo "ccmr modulePath: $(cat CloudCodeModule/BackpackAdventures.ccmr)"

          echo "All required artifacts present."

      # ------------------------------------------------------------------
      # 8. Deploy Cloud Code Module via UGS CLI
      #    ugs deploy handles dotnet build+upload internally.
      #    Pre-building separately causes artifact conflicts.
      # ------------------------------------------------------------------
      - name: Deploy Cloud Code Module
        run: |
          set -e
          ugs deploy CloudCodeModule/ \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ secrets.UNITY_ENVIRONMENT }}

      # ------------------------------------------------------------------
      # 10. Verify deployment — confirm module is listed
      # ------------------------------------------------------------------
      - name: Verify deployment
        run: |
          set -e
          echo "Listing modules in project=${{ secrets.UNITY_PROJECT_ID }} env=${{ secrets.UNITY_ENVIRONMENT }}"
          MODULE_LIST=$(ugs cloud-code modules list \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ secrets.UNITY_ENVIRONMENT }})
          echo "$MODULE_LIST"
          if ! echo "$MODULE_LIST" | grep -qi "BackpackAdventures"; then
            echo "ERROR: BackpackAdventures module not found after deployment. Deploy may have silently failed."
            exit 1
          fi
          echo "Verified: BackpackAdventures is deployed to ${{ secrets.UNITY_ENVIRONMENT }}."

      # ------------------------------------------------------------------
      # 11. Post-deploy smoke test (Cloud Code REST API)
      #
      #     The UGS CLI does NOT expose a run/execute/invoke subcommand
      #     for Cloud Code Modules (only list/get/new/delete/deploy), so
      #     we hit the Cloud Code REST API directly. Verified flow:
      #
      #       1. Resolve env name -> env UUID via `ugs env list`
      #          (token-exchange requires the UUID, not the name).
      #       2. POST token-exchange with Basic(keyId:secret) -> JWT.
      #       3. POST the module function with Bearer JWT.
      #
      #     Endpoints (Unity docs, May 2026):
      #       https://services.api.unity.com/auth/v1/token-exchange
      #       https://cloud-code.services.api.unity.com/v1/projects/{p}/modules/{m}/{fn}
      #
      # TODO(qa-runner): Extend to the full MailboxTestRunner.RunAllAsync
      #     once a headless Unity Test Runner invocation is wired. HealthCheck
      #     plus admin SendGlobalMail stay as fast smoke checks. SendUserMail
      #     also runs when workflow_dispatch input admin_test_player_id is set.
      # ------------------------------------------------------------------
      - name: Post-deploy smoke test (HealthCheck + admin mail)
        continue-on-error: false
        env:
          PROJECT_ID:  ${{ secrets.UNITY_PROJECT_ID }}
          ENV_NAME:    ${{ secrets.UNITY_ENVIRONMENT }}
          SA_KEY:      ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
          SA_SECRET:   ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}
          ADMIN_TEST_PLAYER_ID: ${{ inputs.admin_test_player_id }}
        run: |
          set -e

          echo "--- Resolving environment ID for '$ENV_NAME' ---"
          ENV_LIST=$(ugs env list --project-id "$PROJECT_ID")
          echo "$ENV_LIST"
          # Match the line containing the env name and extract the first
          # UUID-shaped token from it. Robust to column order changes.
          ENV_ID=$(echo "$ENV_LIST" \
            | grep -E "(^|[[:space:]|])${ENV_NAME}([[:space:]|]|$)" \
            | grep -oE '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' \
            | head -1)
          if [ -z "$ENV_ID" ]; then
            echo "ERROR: could not resolve UUID for environment '$ENV_NAME'"
            exit 1
          fi
          echo "Environment ID: $ENV_ID"

          echo "--- Acquiring service-account access token ---"
          BASIC=$(printf '%s' "$SA_KEY:$SA_SECRET" | base64 -w 0)
          TOKEN_JSON=$(curl -sf -X POST \
            -H "Authorization: Basic $BASIC" \
            -H "Content-Type: application/json" \
            -d '{"scopes":[]}' \
            "https://services.api.unity.com/auth/v1/token-exchange?projectId=$PROJECT_ID&environmentId=$ENV_ID")
          ACCESS_TOKEN=$(echo "$TOKEN_JSON" \
            | sed -nE 's/.*"accessToken"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: token-exchange did not return accessToken"
            echo "Response: $TOKEN_JSON"
            exit 1
          fi
          echo "Token acquired (length: ${#ACCESS_TOKEN})"

          echo "--- Smoke test: HealthCheck ---"
          HEALTH_URL="https://cloud-code.services.api.unity.com/v1/projects/$PROJECT_ID/modules/BackpackAdventuresModule/HealthCheck"
          HEALTH_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"params":{}}' \
            "$HEALTH_URL")
          echo "Response: $HEALTH_RESPONSE"

          # HealthCheckResponse is { message, timestamp }; the
          # Cloud Code API wraps it: {"output":{"message":...,"timestamp":...}}.
          if ! echo "$HEALTH_RESPONSE" | grep -q '"message":"Cloud Code module online"'; then
            echo "ERROR: HealthCheck did not return expected message"
            exit 1
          fi
          echo "HealthCheck passed."

          call_module() {
            local endpoint="$1"
            local payload="$2"
            curl -sf -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "https://cloud-code.services.api.unity.com/v1/projects/$PROJECT_ID/modules/BackpackAdventuresModule/$endpoint"
          }

          extract_mail_id() {
            python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); o=d.get("output", d); print(o.get("globalMailId") or o.get("mailId") or "")'
          }

          export RUN_TAG="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "--- Smoke test: SendGlobalMail ---"
          GLOBAL_PAYLOAD=$(python3 - <<'PY'
          import json, os
          run_tag = os.environ["RUN_TAG"]
          print(json.dumps({"params":{"request":{
            "subject": f"CI global smoke {run_tag}",
            "body": "Post-deploy admin global mail smoke test.",
            "expiresAt": None,
            "mailCategory": "System",
            "senderName": "CI Deploy",
            "dedupKey": f"{run_tag}-global",
            "attachments": None,
            "adminToken": "",
            "operatorId": "github-actions"
          }}}))
          PY
          )
          GLOBAL_RESPONSE=$(call_module "SendGlobalMail" "$GLOBAL_PAYLOAD")
          GLOBAL_MAIL_ID=$(echo "$GLOBAL_RESPONSE" | extract_mail_id)
          if [ -z "$GLOBAL_MAIL_ID" ]; then
            echo "ERROR: SendGlobalMail did not return a mail id"
            echo "Response: $GLOBAL_RESPONSE"
            exit 1
          fi
          echo "SendGlobalMail passed: mailId=$GLOBAL_MAIL_ID"

          if [ -n "${ADMIN_TEST_PLAYER_ID:-}" ]; then
            echo "--- Smoke test: SendUserMail ---"
            USER_PAYLOAD=$(python3 - <<'PY'
          import json, os
          run_tag = os.environ["RUN_TAG"]
          print(json.dumps({"params":{"request":{
            "targetPlayerId": os.environ["ADMIN_TEST_PLAYER_ID"],
            "subject": f"CI user smoke {run_tag}",
            "body": "Post-deploy admin user mail smoke test.",
            "expiresAt": None,
            "mailCategory": "System",
            "senderName": "CI Deploy",
            "dedupKey": f"{run_tag}-user",
            "attachments": None,
            "adminToken": "",
            "operatorId": "github-actions"
          }}}))
          PY
            )
            USER_RESPONSE=$(call_module "SendUserMail" "$USER_PAYLOAD")
            USER_MAIL_ID=$(echo "$USER_RESPONSE" | extract_mail_id)
            if [ -z "$USER_MAIL_ID" ]; then
              echo "ERROR: SendUserMail did not return a mail id"
              echo "Response: $USER_RESPONSE"
              exit 1
            fi
            echo "SendUserMail passed: mailId=$USER_MAIL_ID target=$ADMIN_TEST_PLAYER_ID"
          else
            echo "SendUserMail skipped: workflow_dispatch input admin_test_player_id was not provided."
          fi


      # ------------------------------------------------------------------
      # 12. Write GitHub Actions job summary
      # ------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="SUCCESS"; else ICON="FAILED"; fi
          {
            echo "## Cloud Code Deployment — $ICON"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Module** | BackpackAdventures |"
            echo "| **Artifact** | CloudCodeModule/BackpackAdventures.ccmr |"
            echo "| **Environment** | ${{ secrets.UNITY_ENVIRONMENT }} |"
            echo "| **Commit** | ${{ github.sha }} |"
            echo "| **Actor** | ${{ github.actor }} |"
            echo "| **Timestamp** | $(date -u '+%Y-%m-%dT%H:%M:%SZ') |"
            echo "| **Status** | $STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
