# Deploy Admin Web SPA to Cloudflare Pages
#
# Triggers on push to staging or release/* when files under AdminWeb/ change
# (excluding AdminWeb/proxy/** which has its own workflow), or when this
# workflow file itself changes; also supports manual dispatch.
#
# UGS service-account secrets are NEVER injected into the static bundle.
# The SPA routes all Cloud Code calls through the serverless proxy (deploy-proxy.yml).
# Operators enter only the ADMIN_PROXY_TOKEN gate token at runtime (session-only).
#
# Required GitHub repository secrets (Settings → Secrets and variables → Secrets):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Workers:Edit AND Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
#
# Required GitHub repository variable (Settings → Secrets and variables → Variables):
#   VITE_PROXY_URL   — deployed Cloudflare Worker URL, e.g.
#                      https://adminweb-proxy.<account>.workers.dev
#                      (non-secret; set this after the first deploy-proxy run)
#
# Live URL (after first successful deploy):
#   https://adminweb.pages.dev
#
# Build contract (agreed with web-dev):
#   Working directory : AdminWeb/
#   Install command   : npm ci
#   Build command     : npm run build  (VITE_BASE + VITE_PROXY_URL injected at build time)
#   Output directory  : AdminWeb/dist
#   Vite base path    : '/'  (injected via VITE_BASE; default in vite.config.ts is './' for local dev)
#   Proxy URL         : injected via VITE_PROXY_URL (non-secret repo variable)
#
# One-time Cloudflare setup (run once before the first deploy):
#   1. wrangler pages project create adminweb
#      (or create the project in the Cloudflare dashboard under Workers & Pages)
#   2. In the Cloudflare dashboard, set the production branch to: staging
#   3. Ensure CLOUDFLARE_API_TOKEN has Pages:Edit permission (in addition to Workers:Edit).
#
# CORS coupling — ops action required after this migration:
#   Set the repo variable ADMIN_PROXY_ALLOWED_ORIGIN to https://adminweb.pages.dev
#   and re-run deploy-proxy.yml so the Worker allows the new origin.
#   Until this is done, CORS will block SPA → proxy requests.

name: Deploy Admin Web to Cloudflare Pages

on:
  push:
    branches:
      - staging
      - 'release/*'
    paths:
      - 'AdminWeb/**'
      - '!AdminWeb/proxy/**'
      - '.github/workflows/deploy-adminweb.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adminweb-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # 1. Build + Deploy the Vite SPA to Cloudflare Pages
  # ------------------------------------------------------------------
  deploy:
    name: Build and Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AdminWeb/package-lock.json

      - name: Install dependencies
        working-directory: AdminWeb
        run: npm ci

      - name: Build SPA
        working-directory: AdminWeb
        env:
          # Root-serving on *.pages.dev — no subpath prefix needed.
          VITE_BASE: /
          # Non-secret: the deployed Cloudflare Worker URL baked into the bundle.
          # Set VITE_PROXY_URL as a repository variable (not a secret).
          # UGS Key/Secret are NEVER injected here — they live in the Worker only.
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: cf-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: AdminWeb
          command: pages deploy dist --project-name=adminweb --branch=${{ github.ref_name }}

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅ SUCCESS"; else ICON="❌ FAILED"; fi
          {
            echo "## Admin Web Deploy — $ICON"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo "| **Commit** | ${{ github.sha }} |"
            echo "| **Actor** | ${{ github.actor }} |"
            echo "| **Pages URL** | https://adminweb.pages.dev |"
            echo "| **Status** | $STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
