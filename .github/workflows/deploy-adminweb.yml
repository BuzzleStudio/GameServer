# Deploy AdminWeb to Cloudflare Pages
#
# Single Cloudflare Pages project:
#   - AdminWeb/dist      -> static SPA
#   - AdminWeb/functions -> same-origin API proxy at /api/*
#
# Secrets are synced into Cloudflare Pages before each deploy and are available
# only to Pages Functions via context.env. They are never injected into the SPA.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN                  - Cloudflare API token with Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID                 - Cloudflare account ID
#   UNITY_PROJECT_SERVICE_ACCOUNT_KEY     - UGS service-account key ID
#   UNITY_PROJECT_SERVICE_ACCOUNT_SECRET  - UGS service-account secret
#   ADMIN_PROXY_TOKEN                     - Gate token the SPA presents as Bearer
#
# The workflow creates the Cloudflare Pages project automatically when missing.

name: Deploy AdminWeb to Cloudflare Pages

on:
  push:
    branches:
      - staging
      - "release/*"
    paths:
      - "AdminWeb/**"
      - ".github/workflows/deploy-adminweb.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adminweb-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: AdminWeb/package-lock.json

      - name: Install dependencies
        working-directory: AdminWeb
        run: npm ci

      - name: Build SPA
        working-directory: AdminWeb
        env:
          VITE_BASE: /
        run: npm run build

      - name: Ensure Cloudflare Pages project
        working-directory: AdminWeb
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if npx wrangler@3.65.0 pages project list | grep -q '^adminweb[[:space:]]'; then
            echo "Cloudflare Pages project 'adminweb' already exists."
          else
            echo "Creating Cloudflare Pages project 'adminweb'."
            npx wrangler@3.65.0 pages project create adminweb --production-branch=staging
          fi

      - name: Sync Pages secrets
        working-directory: AdminWeb
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          UNITY_PROJECT_SERVICE_ACCOUNT_KEY: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
          UNITY_PROJECT_SERVICE_ACCOUNT_SECRET: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}
          ADMIN_PROXY_TOKEN: ${{ secrets.ADMIN_PROXY_TOKEN }}
        run: |
          set -e
          node -e "const fs=require('fs'); const keys=['UNITY_PROJECT_SERVICE_ACCOUNT_KEY','UNITY_PROJECT_SERVICE_ACCOUNT_SECRET','ADMIN_PROXY_TOKEN']; const out=Object.fromEntries(keys.map(k=>[k,process.env[k]||''])); for (const [k,v] of Object.entries(out)) { if (!v) { console.error('Missing secret: '+k); process.exit(1); } } fs.writeFileSync('.pages-secrets.json', JSON.stringify(out));"
          npx wrangler@3.65.0 pages secret bulk .pages-secrets.json --project-name=adminweb --env=production
          npx wrangler@3.65.0 pages secret bulk .pages-secrets.json --project-name=adminweb --env=preview
          rm .pages-secrets.json

      - name: Deploy SPA and API to Cloudflare Pages
        id: deploy-pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: AdminWeb
          command: pages deploy dist --project-name=adminweb --branch=${{ github.ref_name }}

      - name: Smoke test same-origin API
        env:
          DEPLOYMENT_URL: ${{ steps.deploy-pages.outputs.deployment-url }}
        run: |
          set -e
          BASE_URL="${DEPLOYMENT_URL:-https://adminweb.ninh-buzzle.workers.dev}"
          HEALTH_URL="${BASE_URL%/}/api/health"
          echo "Testing: $HEALTH_URL"

          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" "$HEALTH_URL" || true)
            RESPONSE=$(cat response.json 2>/dev/null || true)
            echo "Attempt $i: HTTP $HTTP_CODE"
            echo "Response: $RESPONSE"

            if [ "$HTTP_CODE" = "200" ] && echo "$RESPONSE" | grep -q '"ok":true'; then
              exit 0
            fi

            sleep 10
          done

          echo "ERROR: health check did not return HTTP 200 with {\"ok\":true}"
          exit 1

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="SUCCESS"; else ICON="FAILED"; fi
          {
            echo "## AdminWeb Pages Deploy - $ICON"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Pages URL** | https://adminweb.ninh-buzzle.workers.dev |"
            echo "| **API** | /api/* same-origin Pages Function |"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo "| **Commit** | ${{ github.sha }} |"
            echo "| **Actor** | ${{ github.actor }} |"
            echo "| **Status** | $STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
