# Deploy Cloud Code Modules
#
# Triggers on push to staging or release/* branches, or manually via workflow_dispatch.
# Builds the .NET Cloud Code Module, authenticates with UGS, deploys, and verifies.
#
# Environment is selected based on branch:
#   staging    → UNITY_ENVIRONMENT (testing)
#   release/*  → UNITY_ENVIRONMENT_PRODUCTION (production)
#
# Required GitHub Secrets:
#   UNITY_PROJECT_ID              — Unity Dashboard project ID
#   UNITY_ENVIRONMENT             — UGS staging environment name
#   UNITY_ENVIRONMENT_PRODUCTION  — UGS production environment name
#   UNITY_PROJECT_SERVICE_ACCOUNT_KEY     - Project-scoped service account key ID
#   UNITY_PROJECT_SERVICE_ACCOUNT_SECRET  - Project-scoped service account secret

name: Deploy Cloud Code Modules

on:
  push:
    branches:
      - staging
      - 'release/*'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-cloud-code:
    name: Deploy BackpackAdventures Cloud Code Module
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UGS_CLI_SERVICE_KEY_ID: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
      UGS_CLI_SERVICE_SECRET_KEY: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}

    steps:
      # ------------------------------------------------------------------
      # 0. Determine target environment based on branch
      # ------------------------------------------------------------------
      - name: Determine deploy environment
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "DEPLOY_ENV=${{ secrets.UNITY_ENVIRONMENT_PRODUCTION }}" >> "$GITHUB_ENV"
            echo "Target: production (UNITY_ENVIRONMENT_PRODUCTION)"
          else
            echo "DEPLOY_ENV=${{ secrets.UNITY_ENVIRONMENT }}" >> "$GITHUB_ENV"
            echo "Target: staging (UNITY_ENVIRONMENT)"
          fi
          echo "Branch: ${{ github.ref_name }}"
          # Fail fast if the environment secret is empty
          if [ -z "$(grep DEPLOY_ENV= "$GITHUB_ENV" | cut -d= -f2-)" ]; then
            echo "ERROR: DEPLOY_ENV is empty. The environment secret for this branch is not set."
            echo "For release/* branches: set UNITY_ENVIRONMENT_PRODUCTION in GitHub Secrets."
            echo "For staging: set UNITY_ENVIRONMENT in GitHub Secrets."
            exit 1
          fi

      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup .NET 7
      # ------------------------------------------------------------------
      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      # ------------------------------------------------------------------
      # 3. Setup Node.js for UGS CLI
      # ------------------------------------------------------------------
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ------------------------------------------------------------------
      # 4. Install Unity Gaming Services CLI
      # ------------------------------------------------------------------
      - name: Install UGS CLI
        run: npm install -g ugs

      # ------------------------------------------------------------------
      # 5. Verify UGS CLI installed
      # ------------------------------------------------------------------
      - name: Verify UGS CLI version
        run: ugs --version

      # ------------------------------------------------------------------
      # 6. Validate required secrets are present
      # ------------------------------------------------------------------
      - name: Validate required secrets
        env:
          PROJECT_ID: ${{ secrets.UNITY_PROJECT_ID }}
          ENVIRONMENT: ${{ env.DEPLOY_ENV }}
          ACCOUNT_KEY: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
          ACCOUNT_SECRET: ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}
        run: |
          set -e
          MISSING=""
          [ -z "$PROJECT_ID" ]     && MISSING="$MISSING UNITY_PROJECT_ID"
          [ -z "$ENVIRONMENT" ]    && MISSING="$MISSING DEPLOY_ENV"
          [ -z "$ACCOUNT_KEY" ]    && MISSING="$MISSING UNITY_PROJECT_SERVICE_ACCOUNT_KEY"
          [ -z "$ACCOUNT_SECRET" ] && MISSING="$MISSING UNITY_PROJECT_SERVICE_ACCOUNT_SECRET"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing required GitHub Secrets:$MISSING"
            echo "Configure them as repository secrets or attach this workflow to a GitHub Environment that provides them."
            exit 1
          fi
          echo "All required secrets are present. Target environment: $ENVIRONMENT"

      # ------------------------------------------------------------------
      # 7. Validate deployment artifacts exist
      # ------------------------------------------------------------------
      - name: Validate deployment artifacts
        run: |
          set -e
          echo "Checking required deployment artifacts..."

          if [ ! -f "CloudCodeModule/BackpackAdventures.ccmr" ]; then
            echo "ERROR: CloudCodeModule/BackpackAdventures.ccmr not found"
            echo "Ensure the backend module was committed to the branch."
            exit 1
          fi

          if [ ! -f "CloudCodeModule/BackpackAdventuresModule~/BackpackAdventuresModule.csproj" ]; then
            echo "ERROR: CloudCodeModule/BackpackAdventuresModule~/BackpackAdventuresModule.csproj not found"
            exit 1
          fi

          echo "ccmr modulePath: $(cat CloudCodeModule/BackpackAdventures.ccmr)"

          echo "All required artifacts present."

      # ------------------------------------------------------------------
      # 8. Deploy Cloud Code Module via UGS CLI
      #    ugs deploy handles dotnet build+upload internally.
      #    Pre-building separately causes artifact conflicts.
      # ------------------------------------------------------------------
      - name: Deploy Cloud Code Module
        run: |
          set -e
          ugs deploy CloudCodeModule/ \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ env.DEPLOY_ENV }}

      # ------------------------------------------------------------------
      # 9. Verify deployment — confirm module is listed
      # ------------------------------------------------------------------
      - name: Verify deployment
        run: |
          set -e
          echo "Listing modules in project=${{ secrets.UNITY_PROJECT_ID }} env=${{ env.DEPLOY_ENV }}"
          MODULE_LIST=$(ugs cloud-code modules list \
            --project-id ${{ secrets.UNITY_PROJECT_ID }} \
            --environment-name ${{ env.DEPLOY_ENV }})
          echo "$MODULE_LIST"
          if ! echo "$MODULE_LIST" | grep -qi "BackpackAdventures"; then
            echo "ERROR: BackpackAdventures module not found after deployment. Deploy may have silently failed."
            exit 1
          fi
          echo "Verified: BackpackAdventures is deployed to ${{ env.DEPLOY_ENV }}."

      # ------------------------------------------------------------------
      # 10. Post-deploy smoke test (Cloud Code REST API — HealthCheck only)
      #
      #     HealthCheck ONLY. Send smoke tests were removed: they wrote
      #     real CI mail into the shared mails_all Cloud Save key on every
      #     deploy, polluting live mailbox data.
      # ------------------------------------------------------------------
      - name: Post-deploy smoke test (HealthCheck)
        continue-on-error: false
        env:
          PROJECT_ID:  ${{ secrets.UNITY_PROJECT_ID }}
          ENV_NAME:    ${{ env.DEPLOY_ENV }}
          SA_KEY:      ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_KEY }}
          SA_SECRET:   ${{ secrets.UNITY_PROJECT_SERVICE_ACCOUNT_SECRET }}
        run: |
          set -e

          echo "--- Resolving environment ID for '$ENV_NAME' ---"
          ENV_LIST=$(ugs env list --project-id "$PROJECT_ID")
          echo "$ENV_LIST"
          # Match the line containing the env name and extract the first
          # UUID-shaped token from it. Robust to column order changes.
          ENV_ID=$(echo "$ENV_LIST" \
            | grep -E "(^|[[:space:]|])${ENV_NAME}([[:space:]|]|$)" \
            | grep -oE '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' \
            | head -1)
          if [ -z "$ENV_ID" ]; then
            echo "ERROR: could not resolve UUID for environment '$ENV_NAME'"
            exit 1
          fi
          echo "Environment ID: $ENV_ID"

          echo "--- Acquiring service-account access token ---"
          BASIC=$(printf '%s' "$SA_KEY:$SA_SECRET" | base64 -w 0)
          TOKEN_JSON=$(curl -sf -X POST \
            -H "Authorization: Basic $BASIC" \
            -H "Content-Type: application/json" \
            -d '{"scopes":[]}' \
            "https://services.api.unity.com/auth/v1/token-exchange?projectId=$PROJECT_ID&environmentId=$ENV_ID")
          ACCESS_TOKEN=$(echo "$TOKEN_JSON" \
            | sed -nE 's/.*"accessToken"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: token-exchange did not return accessToken"
            echo "Response: $TOKEN_JSON"
            exit 1
          fi
          echo "Token acquired (length: ${#ACCESS_TOKEN})"

          echo "--- Smoke test: HealthCheck ---"
          HEALTH_URL="https://cloud-code.services.api.unity.com/v1/projects/$PROJECT_ID/modules/BackpackAdventuresModule/HealthCheck"
          HEALTH_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"params":{}}' \
            "$HEALTH_URL")
          echo "Response: $HEALTH_RESPONSE"

          # HealthCheckResponse is { message, timestamp }; the
          # Cloud Code API wraps it: {"output":{"message":...,"timestamp":...}}.
          if ! echo "$HEALTH_RESPONSE" | grep -q '"message":"Cloud Code module online"'; then
            echo "ERROR: HealthCheck did not return expected message"
            exit 1
          fi
          echo "HealthCheck passed."


      # ------------------------------------------------------------------
      # 11. Write GitHub Actions job summary
      # ------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="SUCCESS"; else ICON="FAILED"; fi
          {
            echo "## Cloud Code Deployment — $ICON"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Module** | BackpackAdventures |"
            echo "| **Artifact** | CloudCodeModule/BackpackAdventures.ccmr |"
            echo "| **Environment** | ${{ env.DEPLOY_ENV }} |"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo "| **Commit** | ${{ github.sha }} |"
            echo "| **Actor** | ${{ github.actor }} |"
            echo "| **Timestamp** | $(date -u '+%Y-%m-%dT%H:%M:%SZ') |"
            echo "| **Status** | $STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
